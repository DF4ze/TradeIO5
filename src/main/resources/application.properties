#Global configuration
spring.application.name=TradeIO5
#for dev mod only
spring.thymeleaf.cache=false

#Tomcat configuration
server.port=8080

#Logging
logging.level.root=INFO
# Le SDK MCP Java embarqué (spring-ai 1.0.9) ne supporte que le protocole 2024-11-05.
# Les clients récents demandent 2025-11-25 : le serveur retombe automatiquement sur la version
# supportée (négociation normale, sans impact fonctionnel) mais logue un WARN à chaque connexion.
# On baisse ce logger précis en ERROR pour couper le bruit en attendant une éventuelle migration
# vers spring-ai 2.0 / MCP SDK 2.0 (nécessite Spring Boot 4 + Java 21, cf. analyse séparée).
logging.level.io.modelcontextprotocol.server.McpAsyncServer=ERROR
# output to a file // Injected in logback-spring.xml that add .log
logging.file.name=logs/${spring.application.name}

#Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/tradeio5
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#MCP Server (Indicator / Strategy / Opinion exposed as tools)
spring.ai.mcp.server.name=tradeio5-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Expose l'analyse Indicator/Strategy/Opinion de TradeIO5 sous forme de tools MCP (get_indicator, evaluate_strategy, get_opinion).
