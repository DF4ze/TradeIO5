<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    
    <head>
		<meta charset="UTF-8">
		<title>Spring Secu Template - Home</title>
		
		<!-- Google Fonts -->
		<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Raleway:300,300i,400,400i,500,500i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">
		
		<!-- Vendor CSS Files -->
		<link href="assets/vendor/aos/aos.css" rel="stylesheet">
		<link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
		<link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
		<link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
		<link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
		<link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">
		
		<!-- Template Main CSS File -->
		<link href="assets/css/style.css" rel="stylesheet">
		
		<!-- Jquery Call -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    </head>
    <body>
    
    
      <!-- ======= Header ======= -->
	<header id="header">
	  <div class="d-flex flex-column">
	
	    <div class="profile">
	    </div>
	
		<nav id="navbar" class="nav-menu navbar">
			<div th:replace="fragments/navbar :: navbar"></div>
		</nav>
	  </div>
	</header>
    
    
    
    <main id="main">
		<!-- ======= Liste Souhaits Participations Section ======= -->
		<section id="about" class="about" >
		  	<div class="container">
		    	<div class="section-title">
					<h2 th:if="${loggued == true}">Bienvenue <span th:text="${username}"></span></h2>
					<h2 th:if="${loggued == false}">Veuillez vous connecter</h2>
				</div>
				
				<!-- Si loggué : liste des avoirs -->
				<div th:if="${loggued == true}">
				  <h3>Vos avoirs :</h3>
				  <table class="table">
				      <thead>
				          <tr>
				              <th>Asset</th>
				              <th>Quantité</th>
				              <th>Prix marché</th>
				              <th>Valeur</th>
				              <th>Prix achat moyen</th>
				              <th>Prix vente moyen</th>
							  <th>Investi</th>
							  <th>Vendu</th>
							  <th>Gain</th>
				              <th>Devise</th>
				          </tr>
				      </thead>
				      <tbody id="assetOverviewBody">
				          <!-- injecté dynamiquement -->
				      </tbody>
				  </table>
				<script>
					$(document).ready(function () {
					    $.ajax({
					        url: '/api/overview',
					        method: 'GET',
					        success: function (data) {
					            console.log(data); // à remplacer ensuite par de l'affichage dans la page
					            // Exemple : afficher les assets
					            let html = '';
					            data.forEach(asset => {
					                html += `<tr>
					                            <td>${asset.asset}</td>
					                            <td>${asset.quantity}</td>
					                            <td>${asset.marketPrice}</td>
					                            <td>${asset.value}</td>
					                            <td>${asset.averageBuyPrice}</td>
												<td>${asset.averageSellPrice}</td>
												<td>${asset.totalInvested}</td>
												<td>${asset.totalSold}</td>
					                            <td>${asset.costBasis}</td>
					                            <td>${asset.quoteCurrency}</td>
					                         </tr>`;
					            });
					            $('#assetOverviewBody').html(html);
					        },
					        error: function (err) {
					            console.error("Erreur lors du chargement des avoirs", err);
					        }
					    });
					});
				</script>
			  </div>
				
				<!-- Si non loggué : inclure login -->
				<div id="login" th:if="${loggued == false}">
					<div th:replace="fragments/login :: login"></div>
				</div>
			</div>
		</section>
	</main>



		<!-- Vendor JS Files -->
		<script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
		<script src="assets/vendor/aos/aos.js"></script>
		<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
		<script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
		<script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
		<script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
		<script src="assets/vendor/typed.js/typed.min.js"></script>
		<script src="assets/vendor/waypoints/noframework.waypoints.js"></script>
		<script src="assets/vendor/php-email-form/validate.js"></script>
		
		<!-- Template Main JS File -->
		 <script src="assets/js/main.js"></script>
		 <script src="assets/js/perso.js"></script>
		
		<script>
		includeHTML();
		</script>


    </body>
</html>
