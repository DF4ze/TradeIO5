spring.application.name=TradeIO5_Test

# DB H2 en memoire
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Optional: changer le port du serveur si necessaire
# server.port=8081

logging.level.root=ERROR
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.fr.ses10doigts=DEBUG
# output to a file // Injected in logback-spring.xml that add .log
logging.file.name=logs/${spring.application.name}

# App Properties
bezkoder.app.jwtCookieName= yourCoockieName
bezkoder.app.jwtSecret= yourCoockieSecretKey
bezkoder.app.jwtExpirationMs= 86400000